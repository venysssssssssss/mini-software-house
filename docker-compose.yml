services:
  ollama:
    image: ollama/ollama:latest
    container_name: mini-software-house-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    healthcheck:
      test: ["CMD", "ollama", "ps"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mini-software-house

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mini-software-house-app
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./workspace:/app/workspace
      - ./src:/app/src:ro
      - ./app.py:/app/app.py:ro
      - ./docs:/app/docs:ro
      - ./tests:/app/tests:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8501:8501"
      - "8000:8000"
    environment:
      OLLAMA_HOST: http://ollama:11434
      PYTHONUNBUFFERED: "1"
      WAIT_FOR_OLLAMA: "1"
      DOCKER_HOST: unix:///var/run/docker.sock
    command: ["sleep", "infinity"]
    working_dir: /app
    init: true
    stdin_open: true
    tty: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - mini-software-house
    healthcheck:
      test: ["CMD", "python", "-m", "src.cli", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  db:
    profiles: ["extras"]
    image: postgres:16-alpine
    container_name: mini-software-house-db
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
      POSTGRES_DB: software_house
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - mini-software-house
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    profiles: ["extras"]
    image: redis:7-alpine
    container_name: mini-software-house-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mini-software-house
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ollama_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  mini-software-house:
    driver: bridge
