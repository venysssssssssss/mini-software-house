version: '3.9'

services:
  # Ollama service for LLM inference
  ollama:
    image: ollama/ollama:latest
    container_name: mini-software-house-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mini-software-house

  # Main application service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mini-software-house-app
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./workspace:/app/workspace
      - ./src:/app/src
      - ./docs:/app/docs
      - ./tests:/app/tests
      - /var/run/docker.sock:/var/run/docker.sock  # For Docker-in-Docker
    ports:
      - "8501:8501"  # Streamlit
      - "8000:8000"  # API
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - PYTHONUNBUFFERED=1
      - CUDA_VISIBLE_DEVICES=0  # Use first GPU, or comma-separated list for multiple
      - DOCKER_HOST=unix:///var/run/docker.sock
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    stdin_open: true
    tty: true
    networks:
      - mini-software-house
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # PostgreSQL database (optional)
  db:
    image: postgres:16-alpine
    container_name: mini-software-house-db
    environment:
      - POSTGRES_USER=appuser
      - POSTGRES_PASSWORD=apppassword
      - POSTGRES_DB=software_house
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - mini-software-house
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and task queue
  redis:
    image: redis:7-alpine
    container_name: mini-software-house-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mini-software-house
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ollama_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  mini-software-house:
    driver: bridge
